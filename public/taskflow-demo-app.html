<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow — Demo Web App oleh Pahchin Dev</title>
<meta name="description" content="Demo aplikasi manajemen tugas dengan autentikasi, CRUD, filter, dan pencarian. Dibangun oleh Pahchin Dev.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg: #0B0E14;
    --surface: #1A1F2B;
    --surface-2: #141925;
    --surface-3: #20273A;
    --border: #262C3B;
    --border-soft: #1F2433;
    --text: #E8EAED;
    --text-dim: #6B7280;
    --text-dimmer: #454C5C;
    --accent: #7C9CFF;
    --accent-dim: #4C5E99;
    --teal: #5EEAD4;
    --coral: #F78C6C;
    --danger: #E2615A;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body, #root{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button, input, select{font-family:inherit; font-size:inherit; color:inherit;}
  button{cursor:pointer; background:none; border:none;}
  a{color:inherit;}
  ::selection{background:var(--accent-dim); color:#fff;}
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- storage helpers (mock persistence, scoped per "user") ---------- */
function loadJSON(key, fallback){
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch(e){ return fallback; }
}
function saveJSON(key, value){
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e){}
}

/* ---------- seed data ---------- */
function seedTasks(){
  return [
    { id: cryptoId(), title: "Riset kompetitor jasa web dev lokal", note: "Bandingkan paket harga 3 vendor di Bali", priority: "tinggi", status: "berjalan", dueDate: addDays(2), createdAt: Date.now()-86400000*3 },
    { id: cryptoId(), title: "Setup repo Taskflow di GitHub", note: "Buat README dan struktur folder awal", priority: "sedang", status: "selesai", dueDate: addDays(-1), createdAt: Date.now()-86400000*5 },
    { id: cryptoId(), title: "Kirim proposal ke klien UMKM kopi", note: "Sertakan mockup landing page", priority: "tinggi", status: "belum", dueDate: addDays(1), createdAt: Date.now()-86400000*1 },
    { id: cryptoId(), title: "Review dataset Bali Tourism MLOps", note: "Cek anomali sebelum training ulang", priority: "rendah", status: "berjalan", dueDate: addDays(5), createdAt: Date.now()-86400000*2 },
    { id: cryptoId(), title: "Update CV dengan project terbaru", note: "", priority: "rendah", status: "belum", dueDate: addDays(7), createdAt: Date.now()-86400000*4 },
  ];
}
function cryptoId(){
  return 't_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}
function addDays(n){
  const d = new Date();
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function formatDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
}
function isOverdue(iso, status){
  if(!iso || status === 'selesai') return false;
  return iso < addDays(0);
}

/* ---------- icons (inline svg, minimal) ---------- */
const Icon = {
  plus: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  check: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
  trash: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>,
  edit: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 113 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  search: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>,
  x: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  logout: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>,
  clock: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>,
  flag: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 21V4a1 1 0 011-1h13.2a.5.5 0 01.4.8L15 9l3.6 5.2a.5.5 0 01-.4.8H5"/></svg>,
};

/* ---------- priority / status meta ---------- */
const PRIORITY_META = {
  tinggi: { label: 'tinggi', color: '#E2615A', bg: 'rgba(226,97,90,0.12)' },
  sedang: { label: 'sedang', color: '#F0B458', bg: 'rgba(240,180,88,0.12)' },
  rendah: { label: 'rendah', color: '#6B7280', bg: 'rgba(107,114,128,0.12)' },
};
const STATUS_META = {
  belum: { label: 'belum dimulai' },
  berjalan: { label: 'sedang berjalan' },
  selesai: { label: 'selesai' },
};

/* ================= LOGIN SCREEN ================= */
function LoginScreen({ onLogin }){
  const [name, setName] = useState('');
  const [err, setErr] = useState('');

  function handleSubmit(e){
    e.preventDefault();
    const trimmed = name.trim();
    if(!trimmed){
      setErr('Masukkan nama untuk masuk.');
      return;
    }
    onLogin(trimmed);
  }

  return (
    <div style={{
      minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      padding:'24px', background:'var(--bg)'
    }}>
      <div style={{ width:'100%', maxWidth:'380px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'32px', justifyContent:'center' }}>
          <span style={{ fontFamily:'var(--mono)', fontWeight:600, fontSize:'17px' }}>
            pahchin<span style={{ color:'var(--teal)' }}>.</span>dev
          </span>
        </div>

        <div style={{
          background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'12px',
          padding:'32px 28px'
        }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:'12px', color:'var(--teal)', marginBottom:'8px' }}>
            taskflow.app
          </div>
          <h1 style={{ fontSize:'21px', fontWeight:700, marginBottom:'6px' }}>Masuk ke akun Anda</h1>
          <p style={{ fontSize:'13.5px', color:'var(--text-dim)', marginBottom:'24px' }}>
            Demo ini memakai autentikasi tiruan — cukup ketik nama untuk masuk. Data tersimpan di perangkat Anda.
          </p>

          <form onSubmit={handleSubmit}>
            <label style={{ fontSize:'12.5px', color:'var(--text-dim)', display:'block', marginBottom:'6px' }} htmlFor="name-input">
              Nama
            </label>
            <input
              id="name-input"
              type="text"
              value={name}
              onChange={(e)=>{ setName(e.target.value); if(err) setErr(''); }}
              placeholder="mis. Afiq"
              autoFocus
              style={{
                width:'100%', background:'var(--surface-2)', border: err ? '1px solid var(--danger)' : '1px solid var(--border)',
                borderRadius:'8px', padding:'11px 14px', fontSize:'14px', marginBottom: err ? '6px' : '18px'
              }}
            />
            {err && <p style={{ fontSize:'12.5px', color:'var(--danger)', marginBottom:'14px' }}>{err}</p>}

            <button type="submit" style={{
              width:'100%', background:'var(--accent)', color:'#0B0E14', fontWeight:600,
              fontSize:'14px', padding:'12px', borderRadius:'8px'
            }}>
              Masuk
            </button>
          </form>
        </div>

        <p style={{ fontSize:'12px', color:'var(--text-dimmer)', textAlign:'center', marginTop:'20px' }}>
          Project demo portofolio — dibangun oleh Pahchin Dev
        </p>
      </div>
    </div>
  );
}

/* ================= TASK FORM (modal) ================= */
function TaskFormModal({ initial, onClose, onSave }){
  const isEdit = !!initial;
  const [title, setTitle] = useState(initial?.title || '');
  const [note, setNote] = useState(initial?.note || '');
  const [priority, setPriority] = useState(initial?.priority || 'sedang');
  const [status, setStatus] = useState(initial?.status || 'belum');
  const [dueDate, setDueDate] = useState(initial?.dueDate || '');
  const [titleErr, setTitleErr] = useState('');
  const firstFieldRef = useRef(null);

  useEffect(()=>{ firstFieldRef.current?.focus(); }, []);

  useEffect(()=>{
    function onKey(e){ if(e.key === 'Escape') onClose(); }
    window.addEventListener('keydown', onKey);
    return ()=> window.removeEventListener('keydown', onKey);
  }, [onClose]);

  function handleSubmit(e){
    e.preventDefault();
    const trimmed = title.trim();
    if(!trimmed){
      setTitleErr('Judul tugas tidak boleh kosong.');
      return;
    }
    onSave({
      id: initial?.id || cryptoId(),
      title: trimmed,
      note: note.trim(),
      priority,
      status,
      dueDate,
      createdAt: initial?.createdAt || Date.now(),
    });
  }

  return (
    <div
      style={{
        position:'fixed', inset:0, background:'rgba(8,10,15,0.7)', backdropFilter:'blur(2px)',
        display:'flex', alignItems:'center', justifyContent:'center', padding:'20px', zIndex:100
      }}
      onMouseDown={(e)=>{ if(e.target === e.currentTarget) onClose(); }}
    >
      <div style={{
        width:'100%', maxWidth:'460px', background:'var(--surface)', border:'1px solid var(--border)',
        borderRadius:'12px', padding:'24px', maxHeight:'88vh', overflowY:'auto'
      }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'18px' }}>
          <h2 style={{ fontSize:'17px', fontWeight:700 }}>{isEdit ? 'Edit tugas' : 'Tugas baru'}</h2>
          <button onClick={onClose} aria-label="Tutup" style={{ color:'var(--text-dim)', padding:'4px' }}>
            <Icon.x width="18" height="18" />
          </button>
        </div>

        <form onSubmit={handleSubmit}>
          <label style={{ fontSize:'12.5px', color:'var(--text-dim)', display:'block', marginBottom:'6px' }}>Judul</label>
          <input
            ref={firstFieldRef}
            type="text"
            value={title}
            onChange={(e)=>{ setTitle(e.target.value); if(titleErr) setTitleErr(''); }}
            placeholder="mis. Kirim invoice ke klien"
            style={{
              width:'100%', background:'var(--surface-2)', border: titleErr ? '1px solid var(--danger)' : '1px solid var(--border)',
              borderRadius:'8px', padding:'10px 12px', fontSize:'14px', marginBottom: titleErr ? '6px' : '14px'
            }}
          />
          {titleErr && <p style={{ fontSize:'12.5px', color:'var(--danger)', marginBottom:'12px' }}>{titleErr}</p>}

          <label style={{ fontSize:'12.5px', color:'var(--text-dim)', display:'block', marginBottom:'6px' }}>Catatan (opsional)</label>
          <textarea
            value={note}
            onChange={(e)=>setNote(e.target.value)}
            rows={3}
            placeholder="Detail tambahan..."
            style={{
              width:'100%', background:'var(--surface-2)', border:'1px solid var(--border)',
              borderRadius:'8px', padding:'10px 12px', fontSize:'14px', marginBottom:'14px', resize:'vertical', fontFamily:'inherit'
            }}
          />

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px' }}>
            <div>
              <label style={{ fontSize:'12.5px', color:'var(--text-dim)', display:'block', marginBottom:'6px' }}>Prioritas</label>
              <select value={priority} onChange={(e)=>setPriority(e.target.value)} style={{
                width:'100%', background:'var(--surface-2)', border:'1px solid var(--border)',
                borderRadius:'8px', padding:'10px 12px', fontSize:'14px'
              }}>
                <option value="tinggi">Tinggi</option>
                <option value="sedang">Sedang</option>
                <option value="rendah">Rendah</option>
              </select>
            </div>
            <div>
              <label style={{ fontSize:'12.5px', color:'var(--text-dim)', display:'block', marginBottom:'6px' }}>Status</label>
              <select value={status} onChange={(e)=>setStatus(e.target.value)} style={{
                width:'100%', background:'var(--surface-2)', border:'1px solid var(--border)',
                borderRadius:'8px', padding:'10px 12px', fontSize:'14px'
              }}>
                <option value="belum">Belum dimulai</option>
                <option value="berjalan">Sedang berjalan</option>
                <option value="selesai">Selesai</option>
              </select>
            </div>
          </div>

          <label style={{ fontSize:'12.5px', color:'var(--text-dim)', display:'block', marginBottom:'6px' }}>Tenggat (opsional)</label>
          <input
            type="date"
            value={dueDate}
            onChange={(e)=>setDueDate(e.target.value)}
            style={{
              width:'100%', background:'var(--surface-2)', border:'1px solid var(--border)',
              borderRadius:'8px', padding:'10px 12px', fontSize:'14px', marginBottom:'22px',
              colorScheme:'dark'
            }}
          />

          <div style={{ display:'flex', gap:'10px' }}>
            <button type="button" onClick={onClose} style={{
              flex:1, border:'1px solid var(--border)', borderRadius:'8px', padding:'11px', fontSize:'14px', fontWeight:600
            }}>
              Batal
            </button>
            <button type="submit" style={{
              flex:1, background:'var(--accent)', color:'#0B0E14', borderRadius:'8px', padding:'11px', fontSize:'14px', fontWeight:600
            }}>
              {isEdit ? 'Simpan perubahan' : 'Tambah tugas'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ================= TASK CARD ================= */
function TaskCard({ task, onToggle, onEdit, onDelete }){
  const pMeta = PRIORITY_META[task.priority];
  const overdue = isOverdue(task.dueDate, task.status);
  const done = task.status === 'selesai';

  return (
    <div style={{
      background:'var(--surface)', border: overdue ? '1px solid rgba(226,97,90,0.4)' : '1px solid var(--border)',
      borderRadius:'10px', padding:'16px 18px', display:'flex', gap:'14px', alignItems:'flex-start',
      opacity: done ? 0.6 : 1
    }}>
      <button
        onClick={()=>onToggle(task.id)}
        aria-label={done ? 'Tandai belum selesai' : 'Tandai selesai'}
        style={{
          width:'22px', height:'22px', borderRadius:'6px', flexShrink:0, marginTop:'2px',
          border: done ? 'none' : '1.5px solid var(--text-dimmer)',
          background: done ? 'var(--teal)' : 'transparent',
          display:'flex', alignItems:'center', justifyContent:'center'
        }}
      >
        {done && <Icon.check width="13" height="13" style={{ color:'#0B0E14' }} />}
      </button>

      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', justifyContent:'space-between', gap:'10px', alignItems:'flex-start' }}>
          <h3 style={{
            fontSize:'14.5px', fontWeight:600,
            textDecoration: done ? 'line-through' : 'none',
            color: done ? 'var(--text-dim)' : 'var(--text)'
          }}>
            {task.title}
          </h3>
          <div style={{ display:'flex', gap:'4px', flexShrink:0 }}>
            <button onClick={()=>onEdit(task)} aria-label="Edit tugas" style={{ color:'var(--text-dim)', padding:'5px' }}>
              <Icon.edit width="15" height="15" />
            </button>
            <button onClick={()=>onDelete(task.id)} aria-label="Hapus tugas" style={{ color:'var(--text-dim)', padding:'5px' }}>
              <Icon.trash width="15" height="15" />
            </button>
          </div>
        </div>

        {task.note && (
          <p style={{ fontSize:'13px', color:'var(--text-dim)', marginTop:'4px' }}>{task.note}</p>
        )}

        <div style={{ display:'flex', flexWrap:'wrap', gap:'8px', marginTop:'10px' }}>
          <span style={{
            fontSize:'11px', fontFamily:'var(--mono)', padding:'3px 9px', borderRadius:'20px',
            color: pMeta.color, background: pMeta.bg, display:'inline-flex', alignItems:'center', gap:'4px'
          }}>
            <Icon.flag width="10" height="10" />
            {pMeta.label}
          </span>
          <span style={{
            fontSize:'11px', fontFamily:'var(--mono)', padding:'3px 9px', borderRadius:'20px',
            color:'var(--text-dim)', background:'var(--surface-2)', border:'1px solid var(--border)'
          }}>
            {STATUS_META[task.status].label}
          </span>
          {task.dueDate && (
            <span style={{
              fontSize:'11px', fontFamily:'var(--mono)', padding:'3px 9px', borderRadius:'20px',
              color: overdue ? '#F2A29D' : 'var(--text-dim)',
              background: overdue ? 'rgba(226,97,90,0.12)' : 'var(--surface-2)',
              border: overdue ? '1px solid rgba(226,97,90,0.3)' : '1px solid var(--border)',
              display:'inline-flex', alignItems:'center', gap:'4px'
            }}>
              <Icon.clock width="10" height="10" />
              {formatDate(task.dueDate)}{overdue ? ' · terlambat' : ''}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

/* ================= EMPTY STATE ================= */
function EmptyState({ hasFilters, onClearFilters, onAddTask }){
  return (
    <div style={{
      textAlign:'center', padding:'56px 24px', border:'1px dashed var(--border)', borderRadius:'12px'
    }}>
      <p style={{ fontSize:'14.5px', fontWeight:600, marginBottom:'6px' }}>
        {hasFilters ? 'Tidak ada tugas yang cocok' : 'Belum ada tugas'}
      </p>
      <p style={{ fontSize:'13px', color:'var(--text-dim)', marginBottom:'18px' }}>
        {hasFilters ? 'Coba ubah kata kunci atau filter yang dipakai.' : 'Tambah tugas pertama untuk mulai mengatur pekerjaan Anda.'}
      </p>
      {hasFilters ? (
        <button onClick={onClearFilters} style={{
          border:'1px solid var(--border)', borderRadius:'8px', padding:'9px 18px', fontSize:'13.5px', fontWeight:600
        }}>
          Hapus semua filter
        </button>
      ) : (
        <button onClick={onAddTask} style={{
          background:'var(--accent)', color:'#0B0E14', borderRadius:'8px', padding:'9px 18px', fontSize:'13.5px', fontWeight:600,
          display:'inline-flex', alignItems:'center', gap:'6px'
        }}>
          <Icon.plus width="14" height="14" />
          Tambah tugas
        </button>
      )}
    </div>
  );
}

/* ================= DASHBOARD ================= */
function Dashboard({ user, onLogout }){
  const storageKey = 'taskflow_tasks_' + user.toLowerCase();
  const [tasks, setTasks] = useState(()=> loadJSON(storageKey, null) || seedTasks());
  const [query, setQuery] = useState('');
  const [statusFilter, setStatusFilter] = useState('semua');
  const [priorityFilter, setPriorityFilter] = useState('semua');
  const [modalState, setModalState] = useState(null); // null | 'new' | task object
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  useEffect(()=>{ saveJSON(storageKey, tasks); }, [tasks, storageKey]);

  function handleToggle(id){
    setTasks(prev => prev.map(t => t.id === id
      ? { ...t, status: t.status === 'selesai' ? 'belum' : 'selesai' }
      : t
    ));
  }
  function handleSave(task){
    setTasks(prev => {
      const exists = prev.some(t => t.id === task.id);
      return exists ? prev.map(t => t.id === task.id ? task : t) : [task, ...prev];
    });
    setModalState(null);
  }
  function handleDelete(id){
    setTasks(prev => prev.filter(t => t.id !== id));
    setDeleteConfirm(null);
  }

  const filtered = useMemo(()=>{
    return tasks
      .filter(t => statusFilter === 'semua' || t.status === statusFilter)
      .filter(t => priorityFilter === 'semua' || t.priority === priorityFilter)
      .filter(t => {
        if(!query.trim()) return true;
        const q = query.trim().toLowerCase();
        return t.title.toLowerCase().includes(q) || t.note.toLowerCase().includes(q);
      })
      .sort((a,b) => b.createdAt - a.createdAt);
  }, [tasks, statusFilter, priorityFilter, query]);

  const stats = useMemo(()=>{
    const total = tasks.length;
    const selesai = tasks.filter(t => t.status === 'selesai').length;
    const berjalan = tasks.filter(t => t.status === 'berjalan').length;
    const overdue = tasks.filter(t => isOverdue(t.dueDate, t.status)).length;
    return { total, selesai, berjalan, overdue };
  }, [tasks]);

  const hasFilters = query.trim() !== '' || statusFilter !== 'semua' || priorityFilter !== 'semua';

  function clearFilters(){
    setQuery(''); setStatusFilter('semua'); setPriorityFilter('semua');
  }

  const initials = user.trim().slice(0,2).toUpperCase();

  return (
    <div style={{ minHeight:'100vh' }}>
      {/* header */}
      <header style={{ borderBottom:'1px solid var(--border)', position:'sticky', top:0, background:'rgba(11,14,20,0.9)', backdropFilter:'blur(10px)', zIndex:10 }}>
        <div style={{ maxWidth:'880px', margin:'0 auto', padding:'16px 20px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
            <span style={{ fontFamily:'var(--mono)', fontWeight:600, fontSize:'15px' }}>
              pahchin<span style={{ color:'var(--teal)' }}>.</span>dev
            </span>
            <span style={{ color:'var(--text-dimmer)', fontSize:'13px' }}>/</span>
            <span style={{ fontFamily:'var(--mono)', fontSize:'13px', color:'var(--text-dim)' }}>taskflow</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:'14px' }}>
            <div style={{
              width:'32px', height:'32px', borderRadius:'50%', background:'var(--surface-3)',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:600, color:'var(--accent)'
            }}>
              {initials}
            </div>
            <button onClick={onLogout} aria-label="Keluar" style={{ color:'var(--text-dim)', display:'flex', alignItems:'center', gap:'6px', fontSize:'13px' }}>
              <Icon.logout width="15" height="15" />
              Keluar
            </button>
          </div>
        </div>
      </header>

      <main style={{ maxWidth:'880px', margin:'0 auto', padding:'32px 20px 80px' }}>
        <div style={{ marginBottom:'28px' }}>
          <h1 style={{ fontSize:'22px', fontWeight:700, marginBottom:'4px' }}>Halo, {user}</h1>
          <p style={{ fontSize:'13.5px', color:'var(--text-dim)' }}>Berikut ringkasan tugas Anda hari ini.</p>
        </div>

        {/* stats */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'12px', marginBottom:'28px' }}>
          <StatCard label="Total tugas" value={stats.total} />
          <StatCard label="Sedang berjalan" value={stats.berjalan} accent="var(--accent)" />
          <StatCard label="Selesai" value={stats.selesai} accent="var(--teal)" />
          <StatCard label="Terlambat" value={stats.overdue} accent={stats.overdue > 0 ? '#E2615A' : undefined} />
        </div>

        {/* toolbar */}
        <div style={{ display:'flex', gap:'10px', marginBottom:'18px', flexWrap:'wrap' }}>
          <div style={{ position:'relative', flex:'1 1 220px' }}>
            <Icon.search width="15" height="15" style={{ position:'absolute', left:'12px', top:'50%', transform:'translateY(-50%)', color:'var(--text-dimmer)' }} />
            <input
              type="text"
              value={query}
              onChange={(e)=>setQuery(e.target.value)}
              placeholder="Cari tugas..."
              style={{
                width:'100%', background:'var(--surface)', border:'1px solid var(--border)',
                borderRadius:'8px', padding:'10px 12px 10px 36px', fontSize:'13.5px'
              }}
            />
          </div>
          <select value={statusFilter} onChange={(e)=>setStatusFilter(e.target.value)} style={{
            background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'8px', padding:'10px 12px', fontSize:'13.5px'
          }}>
            <option value="semua">Semua status</option>
            <option value="belum">Belum dimulai</option>
            <option value="berjalan">Sedang berjalan</option>
            <option value="selesai">Selesai</option>
          </select>
          <select value={priorityFilter} onChange={(e)=>setPriorityFilter(e.target.value)} style={{
            background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'8px', padding:'10px 12px', fontSize:'13.5px'
          }}>
            <option value="semua">Semua prioritas</option>
            <option value="tinggi">Tinggi</option>
            <option value="sedang">Sedang</option>
            <option value="rendah">Rendah</option>
          </select>
          <button
            onClick={()=>setModalState('new')}
            style={{
              background:'var(--accent)', color:'#0B0E14', fontWeight:600, fontSize:'13.5px',
              padding:'10px 18px', borderRadius:'8px', display:'flex', alignItems:'center', gap:'6px', whiteSpace:'nowrap'
            }}
          >
            <Icon.plus width="14" height="14" />
            Tugas baru
          </button>
        </div>

        {/* task list */}
        {filtered.length === 0 ? (
          <EmptyState hasFilters={hasFilters} onClearFilters={clearFilters} onAddTask={()=>setModalState('new')} />
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
            {filtered.map(task => (
              <TaskCard
                key={task.id}
                task={task}
                onToggle={handleToggle}
                onEdit={(t)=>setModalState(t)}
                onDelete={(id)=>setDeleteConfirm(id)}
              />
            ))}
          </div>
        )}
      </main>

      {(modalState === 'new' || (modalState && typeof modalState === 'object')) && (
        <TaskFormModal
          initial={typeof modalState === 'object' ? modalState : null}
          onClose={()=>setModalState(null)}
          onSave={handleSave}
        />
      )}

      {deleteConfirm && (
        <div
          style={{ position:'fixed', inset:0, background:'rgba(8,10,15,0.7)', display:'flex', alignItems:'center', justifyContent:'center', padding:'20px', zIndex:100 }}
          onMouseDown={(e)=>{ if(e.target === e.currentTarget) setDeleteConfirm(null); }}
        >
          <div style={{ width:'100%', maxWidth:'360px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'12px', padding:'24px' }}>
            <h3 style={{ fontSize:'15.5px', fontWeight:700, marginBottom:'8px' }}>Hapus tugas ini?</h3>
            <p style={{ fontSize:'13.5px', color:'var(--text-dim)', marginBottom:'20px' }}>Tindakan ini tidak bisa dibatalkan.</p>
            <div style={{ display:'flex', gap:'10px' }}>
              <button onClick={()=>setDeleteConfirm(null)} style={{ flex:1, border:'1px solid var(--border)', borderRadius:'8px', padding:'10px', fontSize:'13.5px', fontWeight:600 }}>
                Batal
              </button>
              <button onClick={()=>handleDelete(deleteConfirm)} style={{ flex:1, background:'var(--danger)', color:'#fff', borderRadius:'8px', padding:'10px', fontSize:'13.5px', fontWeight:600 }}>
                Hapus
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function StatCard({ label, value, accent }){
  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'10px', padding:'14px 16px' }}>
      <p style={{ fontSize:'11.5px', color:'var(--text-dim)', marginBottom:'6px' }}>{label}</p>
      <p style={{ fontSize:'22px', fontWeight:700, fontFamily:'var(--mono)', color: accent || 'var(--text)' }}>{value}</p>
    </div>
  );
}

/* ================= ROOT APP ================= */
function App(){
  const [user, setUser] = useState(()=> loadJSON('taskflow_user', null));

  function handleLogin(name){
    saveJSON('taskflow_user', name);
    setUser(name);
  }
  function handleLogout(){
    localStorage.removeItem('taskflow_user');
    setUser(null);
  }

  if(!user){
    return <LoginScreen onLogin={handleLogin} />;
  }
  return <Dashboard user={user} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
